name: EAS Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: EAS Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # PR → preview build（internal distribution，QR 碼給組員掃）
      - name: EAS Preview Build (PR)
        if: github.event_name == 'pull_request'
        run: eas build --platform all --non-interactive --profile preview

      # push to main → production build
      - name: EAS Production Build (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas build --platform all --non-interactive --profile production
