name: EAS Build & Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest

    # 掛在 job 層級，所有 step 都能讀到
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # PR → iOS-only preview build (Android free-tier quota reserved for main)
      - name: EAS Preview Build (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: eas build --platform ios --non-interactive --profile preview --no-wait

      # push to main → production build (Android only until Apple Developer account is set up)
      - name: EAS Production Build (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: eas build --platform android --non-interactive --profile production --no-wait
